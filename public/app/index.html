<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>nvate</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prata&family=Manrope:wght@400;500;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Световая сцена: тёплые пятна + падающие детали (наполняет app.js) -->
<div id="glow" aria-hidden="true"></div>

<!-- ═══ Выбор языка (первый вход) ═══ -->
<div id="lang-screen">
  <div class="lang-card">
    <div class="seal-mini">n</div>
    <h1>nvate<i>.</i></h1>
    <p>Tilni tanlang · Выберите язык</p>
    <button id="lang-uz" type="button" class="btn btn--gold btn--block">O‘zbekcha</button>
    <button id="lang-ru" type="button" class="btn btn--ghost btn--block">Русский</button>
  </div>
</div>

<div id="app" hidden>

  <!-- ═══ Навигация ═══ -->
  <nav class="topnav">
    <button id="nav-brand" type="button" class="brand">nvate<i>.</i></button>
    <div class="nav-tabs">
      <button id="nav-tpl" type="button" data-i18n="navTpl"></button>
      <button id="nav-mine" type="button" data-i18n="navMine"></button>
    </div>
    <div class="lang-switch">
      <button id="hsw-uz" type="button">O‘z</button><button id="hsw-ru" type="button">Ру</button>
    </div>
  </nav>

  <!-- ═══ Экран: выбор шаблона ═══ -->
  <main id="screen-templates" class="screen">
    <header class="screen-head">
      <h2 data-i18n="tplTitle"></h2>
      <p data-i18n="tplSub"></p>
    </header>
    <div id="gallery" class="gallery"></div>
  </main>

  <!-- ═══ Экран: мои приглашения ═══ -->
  <main id="screen-mine" class="screen" hidden>
    <header class="screen-head"><h2 data-i18n="mineTitle"></h2></header>
    <div id="mine-list"></div>
    <div class="center-row">
      <button id="mine-create" type="button" class="btn btn--gold"><span data-i18n="createNew"></span></button>
    </div>
  </main>

  <!-- ═══ Экран: студия — одна страница, блоки раскрываются по мере заполнения ═══ -->
  <main id="screen-studio" class="screen" hidden>
    <header class="studio-head">
      <button id="studio-exit" type="button" class="iconbtn" aria-label="Back">‹</button>
      <div class="studio-tpl">
        <b id="studio-tpl-name"></b>
        <span id="studio-tpl-price"></span>
      </div>
      <button id="studio-eye" type="button" class="iconbtn" aria-label="Preview">👁</button>
    </header>
    <div class="studio-progress-wrap"><div class="progress"><div id="progress-fill"></div></div></div>

    <div id="studio-steps">

      <section class="block" data-step="names">
        <div class="block-head"><span class="block-n">1</span><h3 class="block-title" data-i18n="tNames"></h3></div>
        <p class="step-lead" data-i18n="leadNames"></p>
        <div class="field">
          <label for="groom" data-i18n="groom"></label>
          <input id="groom" type="text" maxlength="100" autocomplete="off">
        </div>
        <div class="field">
          <label for="bride" data-i18n="bride"></label>
          <input id="bride" type="text" maxlength="100" autocomplete="off">
        </div>
        <div class="block-err" hidden></div>
        <button type="button" class="block-go btn btn--gold" data-i18n="next"></button>
      </section>

      <section class="block" data-step="datetime" hidden>
        <div class="block-head"><span class="block-n">2</span><h3 class="block-title" data-i18n="tDate"></h3></div>
        <p class="step-lead" data-i18n="leadDate"></p>
        <div class="calendar">
          <div class="cal-nav">
            <button id="cal-prev" type="button">‹</button>
            <div id="cal-title"></div>
            <button id="cal-next" type="button">›</button>
          </div>
          <div id="cal-grid"></div>
        </div>
        <p class="date-label" id="date-label"></p>
        <div class="time-row">
          <div id="time-chips"></div>
          <div class="field time-field">
            <label for="time" data-i18n="time"></label>
            <input id="time" type="time" value="18:00">
          </div>
        </div>
        <div class="block-err" hidden></div>
        <button type="button" class="block-go btn btn--gold" data-i18n="next"></button>
      </section>

      <section class="block" data-step="location" hidden>
        <div class="block-head"><span class="block-n">3</span><h3 class="block-title" data-i18n="tVenue"></h3></div>
        <p class="step-lead" data-i18n="leadVenue"></p>
        <div class="search-row">
          <input id="geo-search" type="text" autocomplete="off">
          <button id="geo-search-btn" type="button" class="btn btn--gold" data-i18n="find"></button>
        </div>
        <div id="geo-results" class="geo-results" hidden></div>
        <div id="map-wrap"><div id="map"></div></div>
        <div class="field">
          <label for="address" data-i18n="address"></label>
          <input id="address" type="text" maxlength="120" autocomplete="off">
        </div>
        <p class="hint" id="coords-hint"></p>
        <div class="block-err" hidden></div>
        <button type="button" class="block-go btn btn--gold" data-i18n="next"></button>
      </section>

      <section class="block" data-step="photos" hidden>
        <div class="block-head"><span class="block-n">4</span><h3 class="block-title" data-i18n="tPhotos"></h3></div>
        <p class="step-lead" id="photo-req"></p>
        <div id="photo-grid"></div>
        <p class="hint" id="photo-hint"></p>
        <input id="photo-input" type="file" accept="image/jpeg,image/png,image/webp" multiple hidden>
        <div class="block-err" hidden></div>
        <button type="button" class="block-go btn btn--gold" data-i18n="next"></button>
      </section>

      <section class="block" data-step="music" hidden>
        <div class="block-head"><span class="block-n">5</span><h3 class="block-title" data-i18n="tMusic"></h3></div>
        <p class="step-lead" data-i18n="leadMusic"></p>

        <div id="music-choice">
          <div id="music-tabs">
            <button type="button" data-mt="none" class="chip active" data-i18n="mtNone"></button>
            <button type="button" data-mt="catalog" class="chip" data-i18n="mtCatalog"></button>
            <button type="button" data-mt="own" class="chip" data-i18n="mtOwn"></button>
          </div>
          <div id="music-catalog" hidden>
            <div class="search-row">
              <input id="music-q" type="text" autocomplete="off">
              <button id="music-q-btn" type="button" class="btn btn--gold">🔍</button>
            </div>
            <div id="music-scroll">
              <div id="top-tracks"></div>
              <div id="track-list"></div>
            </div>
          </div>
          <div id="music-own" hidden>
            <p class="hint" data-i18n="ownHint"></p>
            <input id="music-link" type="url" maxlength="300" placeholder="https://..." autocomplete="off">
            <div class="own-row">
              <span class="hint" data-i18n="or"></span>
              <button id="music-upload-btn" type="button" class="btn btn--ghost-dark" data-i18n="upload"></button>
              <input id="music-file" type="file" accept="audio/*,.mp3,.m4a,.ogg,.wav" hidden>
            </div>
          </div>
        </div>

        <div id="music-selected" hidden>
          <div class="sel-track">
            <span class="sel-icon">🎵</span>
            <div class="sel-info"><b id="sel-name"></b></div>
            <button id="sel-change" type="button" class="btn btn--ghost-dark btn--sm" data-i18n="change"></button>
            <button id="sel-remove" type="button" class="iconbtn iconbtn--sm" aria-label="Remove">✕</button>
          </div>
          <div id="trimmer" hidden>
            <p class="hint" data-i18n="cutTitle"></p>
            <div class="trim-box" id="trim-box">
              <canvas id="trim-wave"></canvas>
              <div id="trim-sel"></div>
              <div id="trim-l" class="trim-handle"></div>
              <div id="trim-r" class="trim-handle"></div>
            </div>
            <div class="trim-row">
              <button id="cut-test" type="button" class="btn btn--ghost-dark btn--sm" data-i18n="listen"></button>
              <span id="trim-lbl"></span>
            </div>
          </div>
          <div id="cut-num-row" hidden>
            <p class="hint" data-i18n="cutTitle"></p>
            <div class="cut-row">
              <div class="field"><label data-i18n="cutStart"></label><input id="cut-start" type="number" min="0" step="1" placeholder="0"></div>
              <div class="field"><label data-i18n="cutEnd"></label><input id="cut-end" type="number" min="1" step="1" placeholder="—"></div>
            </div>
          </div>
          <audio id="cut-audio" preload="metadata" hidden></audio>
        </div>
        <div class="block-err" hidden></div>
        <button type="button" class="block-go btn btn--gold" data-i18n="next"></button>
      </section>

      <section class="block" data-step="guests" hidden>
        <div class="block-head"><span class="block-n">6</span><h3 class="block-title" data-i18n="tGuests"></h3></div>
        <p class="step-lead" data-i18n="leadGuests"></p>
        <div id="guest-list"></div>
        <button id="guest-add" type="button" class="btn btn--ghost-dark btn--block"><span data-i18n="guestAdd"></span></button>
        <div class="guests-total" id="guests-total-row" hidden>
          <span data-i18n="guestsTotalLbl"></span><b id="guests-total"></b>
        </div>
        <p class="hint" data-i18n="guestsHint"></p>
        <div class="block-err" hidden></div>
        <button type="button" class="block-go btn btn--gold" data-i18n="next"></button>
      </section>

      <section class="block" data-step="review" hidden>
        <div class="block-head"><span class="block-n">7</span><h3 class="block-title" data-i18n="tReview"></h3></div>
        <p class="step-lead" data-i18n="leadReview"></p>
        <div class="rv-stage">
          <div class="rv-frame-wrap" id="rv-wrap">
            <iframe id="rv-frame" title="Preview"></iframe>
            <button id="rv-expand" type="button" class="btn btn--gold btn--sm" data-i18n="fullPreview"></button>
          </div>
        </div>
        <div class="card receipt">
          <div id="rv-lines"></div>
          <div class="receipt-total"><span data-i18n="total"></span><b id="rv-total"></b></div>
          <div class="field">
            <label for="contact-tg" data-i18n="tgLabel"></label>
            <input id="contact-tg" type="text" maxlength="40" placeholder="@username" autocomplete="off">
          </div>
          <div class="field">
            <label for="phone" data-i18n="phoneLabel"></label>
            <input id="phone" type="tel" maxlength="20" placeholder="+998 90 123 45 67">
          </div>
          <div class="field">
            <label for="phone2" data-i18n="phone2Label"></label>
            <input id="phone2" type="tel" maxlength="20" placeholder="+998 ...">
          </div>
          <p class="hint" data-i18n="confirmNote"></p>
        </div>
        <div class="block-err" hidden></div>
        <button id="submit-btn" type="button" class="block-go btn btn--gold btn--shine"><span id="submit-label"></span></button>
      </section>

    </div>
  </main>
</div>

<!-- ═══ Шторка предпросмотра ═══ -->
<div id="sheet" hidden>
  <div class="sheet-bar">
    <button id="sheet-close" type="button" class="btn btn--ghost btn--sm" data-i18n="close"></button>
    <button id="sheet-action" type="button" class="btn btn--gold btn--sm" hidden></button>
  </div>
  <iframe id="sheet-frame" title="Preview"></iframe>
</div>

<!-- ═══ Финал: заявка отправлена ═══ -->
<div id="success-screen" hidden>
  <div id="petals"></div>
  <div class="success-card">
    <div class="success-seal">✉</div>
    <h1 data-i18n="okTitle"></h1>
    <p data-i18n="okText"></p>
    <button id="succ-mine" type="button" class="btn btn--gold btn--block"><span data-i18n="navMine"></span></button>
  </div>
</div>

<div id="toasts"></div>

<script src="ui.js"></script>
<script src="app.js"></script>
</body>
</html>
